app.frontend-url=https://falae.dev

#cloudflare r2
r2.endpoint=${R2_ENDPOINT:https://123456789.r2.cloudflarestorage.com}
r2.access-key=${R2_ACCESS_KEY:123123123123}
r2.secret-key=${R2_SECRET_KEY:123123123123}
r2.region=auto
r2.bucket=${R2_BUCKET:r2}
r2.public-url=${R2_PUBLIC_URL:https://r2.falae.dev}


cookie.setSecure=${COOKIE_SET_SECURE:false}
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://192.168.1.75:5173}

#Google OAuth
google.client-id=${GOOGLE_CLIENT_ID:123456789.apps.googleusercontent.com}

#Upload
upload.image.max-size-kb=${UPLOAD_IMAGE_MAX_SIZE_KB:600}

#ZeptoMail
