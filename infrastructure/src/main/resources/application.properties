spring.application.name=falae.dev-api

#server.address=0.0.0.0
#server.port=8081

#Datasource
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:falae_db_v2}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:senha123}

#JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

#JWT
jwt.secret=${TOKEN_SECRET_KEY:zT#xVnu_-EL5E188~'FPv,BNNxMMr!ii#8fN#@%$kZQANBD.fuR6@cNQwZe-VXUe;mT}o2g$y;-FBcB~s<.*m,$/}
jwt.expiration=86400000
jwt.email-verification-expiration=86400000

#Logging
logging.level.com.example=WARN

#flyway
spring.flyway.locations=classpath:db/migration/postgres
spring.flyway.enabled=true
spring.flyway.default-schema=public
